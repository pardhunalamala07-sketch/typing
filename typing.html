<!DOCTYPE html>
<html>
    <head>
        <title>
            Typing
        </title>
        <style>
            .body
            {
                margin-top:130px;
                margin-left:500px;
                box-shadow:5px 5px 5px #888888;
                width:450px;
                height:390px;
                border:3px solid #888888;
            }
            .photo
            {
                display:flex;
            }
            .photo-t
            {
                margin-top:50px;
                margin-left:60px;
                border-radius:2px;
                width:50px;
                height:40px;
            }
            .text
            {
                margin-top:55px;
                margin-left:10px;
                font-size:26px;
                font-weight:Bold;
                font-family:Arial;
            }
            .p1
            {
                font-size:19px;
                font-family:Arial;
                margin-top:2px;
                margin-left:140px;
            }
            .typing
            {
                margin-top:10px;
                margin-left:20px;
                padding-top:0px;
                padding-left:5px;
                padding-bottom:95px;
                font-size:17px;
                font-family:Times;
                display:flex;
                align-items:flex-start;
                width:400px;
                height:40px;
                text-align:top;
            }
            .re
            {
                margin-left:200px;
                margin-top:34px;
                background-color:black;
                color:white;
                padding-top:6px;
                padding-bottom:6px;
                padding-right:9px;
                padding-left:9px;
            }
            .re:hover
            {
                background-color:rgb(77, 76, 76);
                cursor:pointer;
                box-shadow:3px 3px 8px #888888;
            }
            


        </style>
    </head>
    <body>
        <div class="body">
            <div class="photo">
                <img class="photo-t"
                src="photo.avif">
                <div>
                <p class="text">
                    Typing Speed Test
                </p>
                </div>
            </div>
            <div class="p1">
                Practice makes perfect
            </div>
            <div>
                <input class="typing" type="text"
                placeholder="start  typing  here..."
                rows="5" cols="10">
            </div>
            <div class="button">
                <button class="re">
                    Restart
                </button>
            </div>
        </div>
    </body>
</html>
